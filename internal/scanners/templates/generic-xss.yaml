id: generic-xss
info:
  name: Generic Cross-Site Scripting (XSS)
  severity: high
  description: "Reflected XSS via URL parameter payload."
  recommendation: "Properly encode input and use Content-Security-Policy."

http:
  - method: GET
    payloads:
      - "<script>alert(1)</script>"
      - "';alert(1)//"
      - ""><img src=x onerror=alert(1)>"
    matchers:
      - type: word
        part: body
        words:
          - "<script>alert(1)</script>"
          - "';alert(1)//"
          - ""><img src=x onerror=alert(1)>"
