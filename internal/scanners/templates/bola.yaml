id: bola-id-mutation
info:
  name: BOLA (Broken Object Level Authorization)
  severity: high
  description: "Detects potential BOLA via path identifier mutation."
  recommendation: "Enforce object-level authorization for all resource access."

http:
  - method: GET
    mutate_path: true
    matchers:
      - type: word
        part: status
        words: ["200", "201"]
      - type: word
        part: body
        negative: true
        words: ["forbidden", "unauthorized", "not allowed", "access denied"]
